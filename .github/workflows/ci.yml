name: tests

on:
  push:
    # Avoid using all the resources/limits available by checking only
    # relevant branches and tags. Other branches can be checked via PRs.
    branches: [main]
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+\.dev[0-9]+' # Match tags that resemble a version
      - 'v[0-9]+\.[0-9]+\.[0-9]+' # Match tags that resemble a version
  pull_request: # Run in every PR
  workflow_dispatch: # Allow manually triggering the workflow
  schedule:
    # Run roughly every 15 days at 00:00 UTC
    # (useful to check if updates on dependencies break the package)
    - cron: "0 0 1,16 * *"

concurrency:
  group: >-
    ${{ github.workflow }}-${{ github.ref_type }}-
    ${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    name: Check (on Python 3.12)
    steps:
      - uses: actions/checkout@v6
      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '.pre-commit-config.yaml'
          uv-version: "0.10"
      - name: Install dev dependencies
        run: uv sync --only-group dev --frozen
      - uses: tox-dev/action-pre-commit-uv@v1

  test:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.10"
          - "3.11"
          - "3.12"
        platform:
          - ubuntu-latest
          - macos-latest
#          - windows-latest
    runs-on: ${{ matrix.platform }}
    name: "Test (${{ matrix.platform }} on Python ${{ matrix.python }})"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for hatch-vcs versioning
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
      - name: Install dependencies
        run: uv sync --frozen --group test
      - name: Run tests
        run: uv run pytest tests --ignore=tests/s2 -rFEx --durations 10 --color yes

  test-s2:
    needs: check
    runs-on: ubuntu-latest
    name: "Test S2 (on Python 3.12)"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version-file: ".python-version"
      - name: Install dependencies
        run: uv sync --frozen --extra s2 --group test
      - name: Run S2 tests
        run: uv run pytest tests/s2 -rFEx --durations 10 --color yes
      - name: Show coverage report
        run: pipx run coverage report
      - name: Generate coverage report
        run: pipx run coverage lcov -o coverage.lcov
      - name: Upload partial coverage report
        uses: coverallsapp/github-action@v2
        with:
          fail-on-error: false
          path-to-lcov: coverage.lcov
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flag-name: ${{ matrix.platform }} - py${{ matrix.python }}
          parallel: true

  finalize:
    needs: [ test, test-s2]
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        with:
          fail-on-error: false
          parallel-finished: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "Finished checks"

  publish:
    needs: finalize
    if: ${{ github.event_name == 'push' && contains(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/flexmeasures-client/
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v3
        with: {fetch-depth: 0}  # deep clone for setuptools-scm
      - uses: actions/setup-python@v4
        with: { python-version: "3.11" }
      - name: Retrieve pre-built distribution files
        uses: actions/download-artifact@v4
        with:
          name: python-distribution-files
          path: dist/
      - name: Publish Package
        uses: pypa/gh-action-pypi-publish@release/v1
        # run: pipx run tox -e publish
      - name: Publish release on GitHub
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ inputs.custom_version || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_PAT }}
