# ------------------------------------------------------------------
# Run the S2 CEM alongside a running FlexMeasures server stack.
#
# First, start the FlexMeasures server from the flexmeasures folder:
#   docker compose up
#
# Then, from this (flexmeasures-client) folder:
#   docker compose up
# ------------------------------------------------------------------

services:
  cem:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    network_mode: host
    environment:
      FLEXMEASURES_BASE_URL: http://localhost:5000
      FLEXMEASURES_USER: toy-user@flexmeasures.io
      FLEXMEASURES_PASSWORD: toy-password
      LOGGING_LEVEL: INFO
    entrypoint: ["/bin/sh", "-c"]
    command:
    - python3 /app/src/flexmeasures_client/s2/script/websockets_server.py
